name: 'Build macOS ARM DMG'

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '.github/workflows/deploy-pages.yml'

jobs:
  build-macos-arm:
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Compute CalVer version
        id: version
        run: |
          YEAR=$(python3 -c "import datetime; print(datetime.date.today().year)")
          MONTH=$(python3 -c "import datetime; print(datetime.date.today().month)")
          # Count existing stable tags for this month (no hyphen = not a pre-release)
          N=$(git tag -l "${YEAR}.${MONTH}.*" | grep -v -- '-' | wc -l | tr -d ' ')
          COMMITS=$(git rev-list --count HEAD)
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "version=${YEAR}.${MONTH}.${N}-pre.${COMMITS}" >> $GITHUB_OUTPUT
            echo "build_args=--target aarch64-apple-darwin --config tauri.prerelease.conf.json" >> $GITHUB_OUTPUT
            echo "prerelease=true" >> $GITHUB_OUTPUT
            echo "draft=false" >> $GITHUB_OUTPUT
          else
            echo "version=${YEAR}.${MONTH}.${N}" >> $GITHUB_OUTPUT
            echo "build_args=--target aarch64-apple-darwin" >> $GITHUB_OUTPUT
            echo "prerelease=false" >> $GITHUB_OUTPUT
            echo "draft=true" >> $GITHUB_OUTPUT
          fi

      - name: Patch tauri.conf.json
        run: |
          python3 << 'PYEOF'
          import json
          with open('src-tauri/tauri.conf.json', 'r') as f:
              config = json.load(f)
          config['version'] = '${{ steps.version.outputs.version }}'
          with open('src-tauri/tauri.conf.json', 'w') as f:
              json.dump(config, f, indent=2)
          PYEOF

      - name: Build and release Tauri app
        id: tauri-build
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ steps.version.outputs.version }}
          releaseName: 'Tasky ${{ steps.version.outputs.version }}'
          releaseBody: 'See the assets to download this version and install.'
          releaseDraft: ${{ steps.version.outputs.draft }}
          prerelease: ${{ steps.version.outputs.prerelease }}
          updaterJsonPreferNsis: true
          args: ${{ steps.version.outputs.build_args }}
